<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InOutCome — แอปบัญชีรายรับ-รายจ่าย</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0A1612; --surface:#111E17; --card:#162A1E; --border:#1F3828;
      --accent:#22C55E; --accent-t:#4ADE80; --accent-a:rgba(34,197,94,0.1); --accent-b:rgba(34,197,94,0.27);
      --text:#F0FDF4; --text-s:#86EFAC; --text-m:#4B7A5E;
      --pos:#22C55E; --neg:#F87171; --warn:#FCD34D;
      --neg-bg:rgba(248,113,113,0.1); --pos-bg:rgba(34,197,94,0.1);
      --warn-bg:rgba(252,211,77,0.08); --warn-br:rgba(252,211,77,0.25);
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    ::-webkit-scrollbar{display:none}
    body{background:var(--bg);font-family:'Sarabun',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:36px 20px 56px;gap:22px;transition:background .3s}
    /* App header */
    .app-hdr{text-align:center}
    .app-hdr h1{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.5px}
    .app-hdr p{font-size:11px;color:var(--text-m);font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-top:4px}
    /* Theme row */
    .theme-row{display:flex;gap:10px;align-items:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:50px;padding:10px 18px}
    .theme-lbl{font-size:11px;font-weight:700;color:var(--text-m);letter-spacing:.5px;margin-right:4px}
    .swatch{width:26px;height:26px;border-radius:50%;border:3px solid transparent;cursor:pointer;outline:none;transition:all .2s;display:block;padding:0}
    .swatch.on{border-color:#fff;box-shadow:0 0 0 2px var(--accent)}
    /* Phone */
    .phone{width:390px;max-width:calc(100vw - 40px);background:var(--bg);border-radius:52px;overflow:hidden;box-shadow:0 48px 120px rgba(0,0,0,.85),inset 0 0 0 1px rgba(255,255,255,.07);display:flex;flex-direction:column;position:relative;transition:background .3s}
    /* Status bar */
    .status-bar{height:50px;padding:16px 28px 0;display:flex;justify-content:space-between;align-items:center;background:var(--bg);flex-shrink:0;position:relative;z-index:2;transition:background .3s}
    .island{position:absolute;left:50%;transform:translateX(-50%);top:0;width:126px;height:36px;background:#000;border-radius:0 0 22px 22px}
    .st-time{font-size:15px;font-weight:700;color:var(--text)}
    .st-icons{font-size:12px;color:var(--text);opacity:.8}
    /* Content */
    .content{overflow-y:auto;overflow-x:hidden;height:660px;min-height:660px;flex-shrink:0}
    /* Tab bar */
    .tab-bar{height:78px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:8px;flex-shrink:0;transition:background .3s,border-color .3s}
    .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;cursor:pointer;padding:8px 0 0;color:var(--text-m);transition:color .15s}
    .tab-btn.on{color:var(--accent)}
    .tab-btn .ms{font-size:22px;font-variation-settings:'FILL' 1}
    .tab-btn .tl{font-size:10px;font-weight:400;font-family:'Sarabun',sans-serif;line-height:1.4}
    .tab-btn.on .tl{font-weight:700}
    /* General */
    .tab-c{padding-bottom:30px;animation:fadeUp .25s ease}
    .tx-name{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tx-sub{font-size:11px;color:var(--text-m);margin-top:2px}
    .tx-row{padding:12px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
    .tx-ico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .tx-ico .ms{font-size:20px;font-variation-settings:'FILL' 1}
    .tx-info{flex:1;min-width:0}
    .tx-amt{font-size:14px;font-weight:700}
    .income{color:var(--pos)}.expense{color:var(--neg)}
    /* Overview */
    .bal-hero{padding:18px 24px 12px;display:flex;justify-content:space-between;align-items:flex-start}
    .bal-lbl{font-size:11px;font-weight:700;color:var(--text-m);text-transform:uppercase;letter-spacing:1px}
    .bal-amt{font-size:34px;font-weight:800;color:var(--text);line-height:1.1;margin-top:4px;letter-spacing:-1px}
    .bal-amt.neg{color:var(--neg)}
    .bal-date{font-size:12px;color:var(--text-m);margin-top:5px}
    .month-nav{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px 11px;margin-top:4px;transition:background .3s,border-color .3s}
    .month-nav button{background:transparent;border:none;color:var(--text-m);cursor:pointer;font-size:18px;line-height:1;font-weight:300;padding:0}
    .month-nav .ml{font-size:11px;font-weight:700;color:var(--accent-t);white-space:nowrap}
    .pills{display:flex;gap:10px;padding:0 24px 18px}
    .pill{flex:1;border-radius:16px;padding:14px 16px}
    .pill-i{background:var(--pos-bg);border:1px solid rgba(34,197,94,.22)}
    .pill-e{background:var(--neg-bg);border:1px solid rgba(248,113,113,.22)}
    .pill-l{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.8;margin-bottom:4px}
    .pill-i .pill-l{color:var(--pos)}.pill-e .pill-l{color:var(--neg)}
    .pill-v{font-size:18px;font-weight:800}
    .pill-i .pill-v{color:var(--pos)}.pill-e .pill-v{color:var(--neg)}
    .alert{margin:0 24px 18px;background:var(--warn-bg);border:1px solid var(--warn-br);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px}
    .alert-ibox{width:36px;height:36px;background:rgba(252,211,77,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .alert-ibox .ms{font-size:20px;color:var(--warn)}
    .alert-title{font-size:13px;font-weight:700;color:var(--warn)}
    .alert-sub{font-size:11px;color:rgba(252,211,77,.5);margin-top:2px}
    .sec-hdr{padding:0 24px 10px;display:flex;justify-content:space-between;align-items:center}
    .sec-title{font-size:12px;font-weight:800;color:var(--text);text-transform:uppercase;letter-spacing:.8px}
    .see-all{font-size:12px;font-weight:600;color:var(--accent)}
    .sec-lbl{font-size:11px;font-weight:700;color:var(--text-m);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
    .unpaid-card{margin:18px 24px 0;background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:background .3s,border-color .3s}
    .unpaid-hdr{padding:13px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
    .neg-badge{font-size:11px;font-weight:700;background:var(--neg);color:#fff;border-radius:20px;padding:3px 10px}
    .unpaid-row{padding:12px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
    .unpaid-name{font-size:14px;font-weight:500;color:var(--text)}
    .neg-amt{font-size:15px;font-weight:700;color:var(--neg)}
    .neg-amt-lg{font-size:15px;font-weight:800;color:var(--neg)}
    .unpaid-foot{padding:12px 18px;display:flex;justify-content:space-between}
    /* Transactions */
    .pg-hdr{padding:18px 24px 14px;display:flex;justify-content:space-between;align-items:center}
    .pg-title{font-size:22px;font-weight:800;color:var(--text)}
    .btn-grn{width:38px;height:38px;background:var(--accent);border:none;border-radius:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .btn-grn .ms{font-size:22px;color:#000}
    .btn-gry{width:38px;height:38px;background:var(--card);border:1px solid var(--border);border-radius:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .3s,border-color .3s}
    .btn-gry .ms{font-size:20px;color:var(--text-m)}
    .filter-row{padding:0 24px 16px;display:flex;gap:8px}
    .fp{padding:7px 16px;border-radius:20px;font-size:12px;cursor:pointer;font-family:'Sarabun',sans-serif}
    .fp.on{background:var(--accent);border:none;font-weight:700;color:#000}
    .fp.off{background:var(--card);border:1px solid var(--border);font-weight:500;color:var(--text-m)}
    .dg-hdr{padding:6px 24px 8px;font-size:11px;font-weight:700;color:var(--text-m);text-transform:uppercase;letter-spacing:.8px}
    .tx-row1{padding:13px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
    .more-btn{width:28px;height:28px;border-radius:8px;background:transparent;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center}
    .more-btn .ms{font-size:14px;color:var(--text-m)}
    /* Cards */
    .rec-btn{width:100%;background:var(--accent);border:none;border-radius:14px;padding:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
    .rec-btn .ms{font-size:20px}
    .rec-btn .rt{font-size:14px;font-weight:700;font-family:'Sarabun',sans-serif}
    .card-wrap{margin:0 24px 20px}
    .card-g{border-radius:18px;padding:20px;position:relative;overflow:hidden;aspect-ratio:1.72;display:flex;flex-direction:column;justify-content:space-between}
    .cc1{position:absolute;right:-30px;top:-30px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.04)}
    .cc2{position:absolute;right:20px;bottom:-50px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.05)}
    .card-name{font-size:18px;font-weight:800;color:rgba(255,255,255,.9);z-index:1;position:relative;font-family:'Sarabun',sans-serif}
    .card-ico{font-size:30px;color:rgba(255,255,255,.5);z-index:1;position:relative}
    .chip{width:38px;height:28px;background:linear-gradient(135deg,rgba(255,200,50,.85),rgba(200,140,20,.7));border-radius:5px;margin-bottom:14px;position:relative;z-index:1}
    .card-num{font-size:13px;color:rgba(255,255,255,.5);letter-spacing:3px;position:relative;z-index:1}
    .clbl{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:.8px;margin-bottom:2px}
    .cval{font-size:14px;font-weight:700;color:rgba(255,255,255,.9);font-family:'Sarabun',sans-serif}
    .card-det{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 18px 18px;padding:16px 18px;transition:background .3s,border-color .3s}
    .bar-t{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:6px}
    .bar-f{height:100%;border-radius:3px;transition:width .4s ease}
    .acc-t{font-size:11px;color:var(--accent-t)}
    .warn-t{font-size:15px;font-weight:700;color:var(--warn)}
    .v-div{width:1px;background:var(--border)}
    .hist-btn{padding:9px 14px;background:transparent;border:1px solid var(--border);border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:6px}
    .hist-btn .ms{font-size:15px;color:var(--text-m)}
    .hist-btn .ht{font-size:12px;font-weight:600;color:var(--text-m);font-family:'Sarabun',sans-serif}
    /* Loans */
    .loan-card{margin:10px 24px 0;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;transition:background .3s,border-color .3s}
    .loan-ico{width:44px;height:44px;background:var(--accent-a);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .3s}
    .loan-ico .ms{font-size:22px;color:var(--accent);font-variation-settings:'FILL' 1}
    .loan-debt{font-size:24px;font-weight:800;color:var(--text);letter-spacing:-.5px}
    .loan-monthly{font-size:18px;font-weight:700;color:var(--accent-t)}
    .fl{font-size:10px;color:var(--text-m);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
    .paid-lbl{font-size:11px;color:var(--text-m);margin-bottom:14px}
    .pay-btn{width:100%;background:var(--accent-a);border:1px solid var(--accent-b);border-radius:12px;padding:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .3s,border-color .3s}
    .pay-btn .ms{font-size:18px;color:var(--accent);font-variation-settings:'FILL' 1}
    .pay-btn .pt{font-size:13px;font-weight:600;color:var(--accent);font-family:'Sarabun',sans-serif}
    /* Monthly */
    .m-summary{margin:12px 24px 16px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 18px;transition:background .3s,border-color .3s}
    .m-bar-t{height:6px;width:140px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:5px}
    .m-total{font-size:20px;font-weight:800;color:var(--text)}
    .m-row{padding:14px 24px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border)}
    .m-row.paid{opacity:.55}
    .chk{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .chk.on{background:var(--accent);border:none}
    .chk.off{background:transparent;border:2px solid var(--border)}
    .chk-mark{font-size:13px;font-weight:800;line-height:1}
    .m-foot{margin:16px 24px 0;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;display:flex;justify-content:space-between;transition:background .3s,border-color .3s}
    .m-foot-amt{font-size:16px;font-weight:800;color:var(--pos)}
    /* Settings */
    .s-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:background .3s,border-color .3s}
    .s-row-b{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center}
    .s-row-l{padding:14px 16px}
    .stat-dot{width:8px;height:8px;border-radius:50%;background:var(--pos);flex-shrink:0;margin-right:10px;display:inline-block}
    .conn{font-size:13px;font-weight:500;color:var(--text-s)}
    .flbl{font-size:10px;color:var(--text-m);letter-spacing:.5px;margin-bottom:4px}
    .fval{font-size:12px;color:var(--text);font-family:monospace;opacity:.7}
    .io-btns{display:flex;gap:10px}
    .io-btn{flex:1;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;transition:background .3s,border-color .3s}
    .io-btn .ms{font-size:26px}
    .io-btn .it{font-size:12px;font-weight:600;color:var(--text);font-family:'Sarabun',sans-serif}
    .pin-row{padding:16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
    .pin-ico{font-size:20px;color:var(--accent)}
    .pin-name{font-size:14px;font-weight:600;color:var(--text)}
    .pin-tog{width:46px;height:26px;background:var(--accent);border-radius:13px;position:relative;cursor:pointer;transition:background .3s}
    .pin-tog::after{content:'';position:absolute;right:3px;top:3px;width:20px;height:20px;background:#fff;border-radius:50%}
    .pin-chg{font-size:14px;font-weight:600;color:var(--accent)}
    .app-info{padding:8px 24px 20px;text-align:center}
    .app-info-t{font-size:18px;font-weight:800;color:var(--text);margin-bottom:5px}
    .app-info-u{font-size:11px;color:var(--text-m);opacity:.5;margin-top:3px}
  </style>
</head>
<body>

<!-- PIN Overlay -->
<div id="pin-overlay" style="position:fixed;inset:0;background:#0A1612;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:'Sarabun',sans-serif">
  <div style="font-size:36px;margin-bottom:10px">🔒</div>
  <div style="font-size:20px;font-weight:800;color:#F0FDF4;margin-bottom:4px">InOutCome</div>
  <div style="font-size:12px;color:#4B7A5E;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:28px">กรอก PIN 6 หลัก</div>
  <div style="display:flex;gap:14px;margin-bottom:16px">
    <div id="dot-0" style="width:14px;height:14px;border-radius:50%;border:2px solid #1F3828;background:transparent;transition:all .15s"></div>
    <div id="dot-1" style="width:14px;height:14px;border-radius:50%;border:2px solid #1F3828;background:transparent;transition:all .15s"></div>
    <div id="dot-2" style="width:14px;height:14px;border-radius:50%;border:2px solid #1F3828;background:transparent;transition:all .15s"></div>
    <div id="dot-3" style="width:14px;height:14px;border-radius:50%;border:2px solid #1F3828;background:transparent;transition:all .15s"></div>
    <div id="dot-4" style="width:14px;height:14px;border-radius:50%;border:2px solid #1F3828;background:transparent;transition:all .15s"></div>
    <div id="dot-5" style="width:14px;height:14px;border-radius:50%;border:2px solid #1F3828;background:transparent;transition:all .15s"></div>
  </div>
  <div id="pin-error" style="color:#F87171;font-size:13px;min-height:20px;margin-bottom:16px"></div>
  <div style="display:grid;grid-template-columns:repeat(3,72px);gap:10px">
    <button onclick="pinPress('1')" style="height:72px;font-size:22px;font-weight:700;border:none;border-radius:50%;background:#162A1E;color:#F0FDF4;cursor:pointer;font-family:'Sarabun',sans-serif">1</button>
    <button onclick="pinPress('2')" style="height:72px;font-size:22px;font-weight:700;border:none;border-radius:50%;background:#162A1E;color:#F0FDF4;cursor:pointer;font-family:'Sarabun',sans-serif">2</button>
    <button onclick="pinPress('3')" style="height:72px;font-size:22px;font-weight:700;border:none;border-radius:50%;background:#162A1E;color:#F0FDF4;cursor:pointer;font-family:'Sarabun',sans-serif">3</button>
    <button onclick="pinPress('4')" style="height:72px;font-size:22px;font-weight:700;border:none;border-radius:50%;background:#162A1E;color:#F0FDF4;cursor:pointer;font-family:'Sarabun',sans-serif">4</button>
    <button onclick="pinPress('5')" style="height:72px;font-size:22px;font-weight:700;border:none;border-radius:50%;background:#162A1E;color:#F0FDF4;cursor:pointer;font-family:'Sarabun',sans-serif">5</button>
    <button onclick="pinPress('6')" style="height:72px;font-size:22px;font-weight:700;border:none;border-radius:50%;background:#162A1E;color:#F0FDF4;cursor:pointer;font-family:'Sarabun',sans-serif">6</button>
    <button onclick="pinPress('7')" style="height:72px;font-size:22px;font-weight:700;border:none;border-radius:50%;background:#162A1E;color:#F0FDF4;cursor:pointer;font-family:'Sarabun',sans-serif">7</button>
    <button onclick="pinPress('8')" style="height:72px;font-size:22px;font-weight:700;border:none;border-radius:50%;background:#162A1E;color:#F0FDF4;cursor:pointer;font-family:'Sarabun',sans-serif">8</button>
    <button onclick="pinPress('9')" style="height:72px;font-size:22px;font-weight:700;border:none;border-radius:50%;background:#162A1E;color:#F0FDF4;cursor:pointer;font-family:'Sarabun',sans-serif">9</button>
    <button onclick="pinDel()" style="height:72px;font-size:20px;border:none;border-radius:50%;background:#162A1E;color:#4B7A5E;cursor:pointer">⌫</button>
    <button onclick="pinPress('0')" style="height:72px;font-size:22px;font-weight:700;border:none;border-radius:50%;background:#162A1E;color:#F0FDF4;cursor:pointer;font-family:'Sarabun',sans-serif">0</button>
    <div></div>
  </div>
</div>
<script>
const PIN_CODE = '190290';
let pinInput = '';
function pinPress(d) {
  if (pinInput.length >= 6) return;
  pinInput += d;
  const dot = document.getElementById('dot-'+(pinInput.length-1));
  dot.style.background = '#22C55E'; dot.style.borderColor = '#22C55E';
  if (pinInput.length === 6) {
    setTimeout(() => {
      if (pinInput === PIN_CODE) {
        sessionStorage.setItem('pin_ok','1');
        document.getElementById('pin-overlay').style.display = 'none';
      } else {
        document.getElementById('pin-error').textContent = 'PIN ไม่ถูกต้อง ลองใหม่อีกครั้ง';
        pinInput = '';
        for (let i=0;i<6;i++) {
          const d = document.getElementById('dot-'+i);
          d.style.background = 'transparent'; d.style.borderColor = '#1F3828';
        }
      }
    }, 200);
  }
}
function pinDel() {
  if (!pinInput.length) return;
  const dot = document.getElementById('dot-'+(pinInput.length-1));
  dot.style.background = 'transparent'; dot.style.borderColor = '#1F3828';
  pinInput = pinInput.slice(0,-1);
  document.getElementById('pin-error').textContent = '';
}
if (sessionStorage.getItem('pin_ok') === '1') {
  document.getElementById('pin-overlay').style.display = 'none';

const CARDS = [

// ── Helpers ────────────────────────────────────────────────────────────────
const fmt  = n => n.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD = s => { const[,m,d]=s.split('-').map(Number); return d+' '+MS[m-1]; };
const barColor = p => p<0.5?'var(--pos)':p<0.8?'var(--warn)':'var(--neg)';

function txRow(tx, extraClass='tx-row') {
  const c = CAT[tx.cat]||{icon:'payments',color:'#94A3B8',bg:'rgba(148,163,184,0.12)'};
  return `<div class="${extraClass}">
    <div class="tx-ico" style="background:${c.bg}"><span class="ms material-symbols-rounded" style="color:${c.color}">${c.icon}</span></div>
    <div class="tx-info"><div class="tx-name">${tx.name}</div><div class="tx-sub">${tx.cat}</div></div>
    <div style="text-align:right;flex-shrink:0">
      <div class="tx-amt ${tx.type}">${tx.type==='income'?'+':'-'}฿${fmt(tx.amt)}</div>
      <div class="tx-sub">${fmtD(tx.date)}</div>
    </div>
  </div>`;
}

// ── Tab renderers ──────────────────────────────────────────────────────────

// ── Render functions ───────────────────────────────────────────────────────
const TABS = [{icon:'home',lbl:'ภาพรวม'},{icon:'receipt_long',lbl:'รายการ'},{icon:'credit_card',lbl:'บัตร'},{icon:'account_balance',lbl:'สินเชื่อ'},{icon:'calendar_month',lbl:'รายเดือน'},{icon:'settings',lbl:'ตั้งค่า'}];
const RENDERERS = [tab0,tab1,tab2,tab3,tab4,tab5];

function renderTabBar() {
  document.getElementById('tab-bar').innerHTML = TABS.map((t,i)=>
    `<button class="tab-btn ${i===S.tab?'on':''}" data-tab="${i}"><span class="ms material-symbols-rounded">${t.icon}</span><span class="tl">${t.lbl}</span></button>`
  ).join('');
}

function renderContent() {
  document.getElementById('content').innerHTML = RENDERERS[S.tab]();
  const p=document.getElementById('btn-prev'), n=document.getElementById('btn-next');
  if(p) p.onclick=()=>{ S.month===0?(S.month=11,S.year--):S.month--; renderContent(); };
  if(n) n.onclick=()=>{ S.month===11?(S.month=0,S.year++):S.month++; renderContent(); };
}

function applyTheme(id) {
  S.theme=id;
  const T=THEMES[id];
  Object.entries(T).forEach(([k,v])=>document.documentElement.style.setProperty(k,v));
  document.body.style.background=T['--bg'];
  document.querySelectorAll('.swatch').forEach(b=>b.classList.toggle('on',b.dataset.theme===id));
}

// ── Event delegation ───────────────────────────────────────────────────────
document.querySelector('.theme-row').addEventListener('click',e=>{
  const b=e.target.closest('.swatch'); if(b) applyTheme(b.dataset.theme);
});
document.getElementById('tab-bar').addEventListener('click',e=>{
  const b=e.target.closest('.tab-btn'); if(b){ S.tab=+b.dataset.tab; renderTabBar(); renderContent(); }
});

// ── Init ───────────────────────────────────────────────────────────────────
renderTabBar();
renderContent();
</script>
